<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Interactive Task Manager</title>
  <link rel="stylesheet" href="/workspaces/Task-manager/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="icon-btn danger-btn" id="clear-completed-btn" aria-label="Clear all completed tasks" title="Clear completed">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="app-container">

      <!-- ══ STATS BAR ══════════════════════════════════ -->
      <section class="stats-bar" aria-label="Task statistics">
        <div class="stat-card">
          <span class="stat-num" id="total-tasks">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat-card">
          <span class="stat-num accent" id="active-tasks">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat-card">
          <span class="stat-num green" id="completed-tasks">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat-card progress-card">
          <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span class="stat-label" id="progress-label">0% done</span>
        </div>
      </section>

      <!-- ══ ADD TASK FORM ══════════════════════════════ -->
      <section class="add-section" aria-label="Add new task">
        <form class="add-form" id="add-form" novalidate>
          <div class="add-form-top">
            <div class="input-wrap">
              <input
                type="text"
                id="task-input"
                class="task-input"
                placeholder="Add a new task… (press Enter or click Add)"
                maxlength="120"
                autocomplete="off"
                aria-label="New task description"
                aria-required="true"
              />
              <span class="char-count" id="char-count">120</span>
            </div>
            <button type="submit" class="add-btn" aria-label="Add task">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add
            </button>
          </div>
          <div class="add-form-meta">
            <div class="meta-group">
              <label for="priority-select" class="meta-label">Priority</label>
              <select id="priority-select" class="meta-select" aria-label="Task priority">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
            <div class="meta-group">
              <label for="due-date" class="meta-label">Due date</label>
              <input type="date" id="due-date" class="meta-input" aria-label="Task due date" />
            </div>
            <div class="meta-group">
              <label for="category-input" class="meta-label">Category</label>
              <input type="text" id="category-input" class="meta-input" placeholder="e.g. Work, Study" maxlength="30" aria-label="Task category" />
            </div>
          </div>
          <span class="form-error" id="form-error" role="alert" aria-live="polite"></span>
        </form>
      </section>

      <!-- ══ SEARCH + FILTERS ══════════════════════════ -->
      <section class="controls-bar" aria-label="Search and filter tasks">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search tasks…"
            aria-label="Search tasks"
          />
        </div>
        <div class="filter-btns" role="group" aria-label="Filter tasks">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button class="filter-btn" data-filter="high">🔴 High</button>
          <button class="filter-btn" data-filter="overdue">⚠ Overdue</button>
        </div>
      </section>

      <!-- ══ SORT BAR ═══════════════════════════════════ -->
      <div class="sort-bar">
        <span class="sort-label">Sort by:</span>
        <button class="sort-btn active" data-sort="created">Date added</button>
        <button class="sort-btn" data-sort="priority">Priority</button>
        <button class="sort-btn" data-sort="due">Due date</button>
        <button class="sort-btn" data-sort="alpha">A–Z</button>
        <span class="task-count-label" id="task-count-label"></span>
      </div>

      <!-- ══ TASK LIST ══════════════════════════════════ -->
      <section aria-label="Task list">
        <ul class="task-list" id="task-list" role="list" aria-live="polite" aria-label="Tasks">
          <!-- Tasks rendered by JS -->
        </ul>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state" hidden>
          <div class="empty-icon" aria-hidden="true">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <path d="M9 12h6M12 9v6"/>
            </svg>
          </div>
          <p class="empty-title" id="empty-title">No tasks yet</p>
          <p class="empty-sub" id="empty-sub">Add your first task above to get started.</p>
        </div>
      </section>

      <!-- ══ KEYBOARD SHORTCUTS HINT ═══════════════════ -->
      <div class="shortcuts-hint" aria-label="Keyboard shortcuts">
        <kbd>Enter</kbd> Add task &nbsp;·&nbsp;
        <kbd>Esc</kbd> Cancel edit &nbsp;·&nbsp;
        <kbd>/</kbd> Focus search
      </div>

    </div>
  </main>

  <!-- ══ EDIT MODAL ════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Edit task</h2>
        <button class="icon-btn" id="modal-close" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="edit-text" class="form-label">Task</label>
          <input type="text" id="edit-text" class="task-input" maxlength="120" aria-required="true" />
          <span class="form-error" id="edit-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="add-form-meta">
          <div class="meta-group">
            <label for="edit-priority" class="meta-label">Priority</label>
            <select id="edit-priority" class="meta-select">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="meta-group">
            <label for="edit-due" class="meta-label">Due date</label>
            <input type="date" id="edit-due" class="meta-input" />
          </div>
          <div class="meta-group">
            <label for="edit-category" class="meta-label">Category</label>
            <input type="text" id="edit-category" class="meta-input" maxlength="30" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save changes</button>
      </div>
    </div>
  </div>

  <script src="/workspaces/Task-manager/app.js"></script>
</body>
</html>
